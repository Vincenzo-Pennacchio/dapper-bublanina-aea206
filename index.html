<script type="text/babel">
const{useState,useEffect,useRef}=React;

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function getLevel(xp){return LEVELS.find(l=>xp<l.max)||LEVELS[LEVELS.length-1];}
function getLevelProgress(xp){
  const i=LEVELS.findIndex(l=>xp<l.max);
  if(i<0) return{pct:100,current:LEVELS[LEVELS.length-1]};
  const prev=i>0?LEVELS[i-1].max:0;
  return{pct:Math.round((xp-prev)/(LEVELS[i].max-prev)*100),current:LEVELS[i],next:LEVELS[i+1]};
}
function getWordOfDay(all){return all[Math.floor(Date.now()/86400000)%all.length];}
function todayStr(){return new Date().toDateString();}

// ── MEME NAPOLETANI · helpers ────────────────────────────────────────────────
function parseYt(url){const m=String(url).match(/(?:youtu\.be\/|[?&]v=|shorts\/|embed\/|live\/)([\w-]{8,})/);return m?m[1]:null;}
function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open('lunaletters_audio',1);r.onupgradeneeded=()=>{r.result.createObjectStore('audio');};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function idbPut(k,blob){return idbOpen().then(db=>new Promise((res,rej)=>{const t=db.transaction('audio','readwrite');t.objectStore('audio').put(blob,k);t.oncomplete=res;t.onerror=()=>rej(t.error);}));}
function idbGet(k){return idbOpen().then(db=>new Promise((res,rej)=>{const t=db.transaction('audio');const q=t.objectStore('audio').get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);}));}
function idbDel(k){return idbOpen().then(db=>new Promise((res,rej)=>{const t=db.transaction('audio','readwrite');t.objectStore('audio').delete(k);t.oncomplete=res;t.onerror=()=>rej(t.error);}));}
function itDate(){try{return new Date().toLocaleDateString('it-IT',{day:'numeric',month:'long'});}catch{return 'oggi';}}

const SERIF="'Cormorant Garamond',Georgia,serif";
const S={
  app:{minHeight:"100vh",background:"linear-gradient(180deg,#1b0726 0%,#2b0e40 52%,#190a30 100%)",color:"#fdf3f8",fontFamily:"system-ui,sans-serif"},
  wrap:{maxWidth:500,margin:"0 auto",padding:"0 16px 90px"},
  card:(ex={})=>({background:"rgba(244,143,177,0.05)",borderRadius:24,border:"1px solid rgba(244,143,177,0.25)",padding:20,marginBottom:16,...ex}),
  btn:(g="linear-gradient(135deg,#ec6aa0,#b14df0)",ex={})=>({background:g,border:"none",borderRadius:15,padding:"12px 22px",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",...ex}),
  soft:(ex={})=>({background:"rgba(244,143,177,0.08)",border:"1px solid rgba(244,143,177,0.3)",borderRadius:15,padding:"10px 18px",color:"#fdf3f8",fontSize:14,cursor:"pointer",...ex}),
  back:{background:"none",border:"1px solid rgba(244,143,177,0.3)",borderRadius:12,padding:"8px 16px",color:"#c8a0c0",fontSize:13,cursor:"pointer",marginBottom:16},
  bar:{background:"rgba(255,255,255,0.12)",borderRadius:10,height:6,overflow:"hidden",margin:"8px 0"},
  fill:(p)=>({height:"100%",width:`${Math.min(p,100)}%`,background:"linear-gradient(90deg,#f48fb1,#ce93d8)",borderRadius:10,transition:"width 0.6s ease"}),
  gtxt:{fontSize:32,fontWeight:500,fontStyle:"italic",fontFamily:SERIF,color:"#f8d7e8"},
  serif:{fontFamily:SERIF},
  muted:{color:"#c8a0c0",fontSize:13},
  center:{textAlign:"center"},
  spk:{background:"rgba(244,143,177,0.10)",border:"1px solid rgba(244,143,177,0.4)",borderRadius:20,padding:"6px 16px",color:"#f8bbd0",fontSize:13,cursor:"pointer",margin:"8px 0 4px"},
};

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function Confetti(){
  const[pieces]=useState(()=>Array.from({length:65},(_,i)=>({
    id:i,x:Math.random()*100,delay:Math.random()*0.9,
    dur:2.2+Math.random()*1.8,size:5+Math.random()*9,
    color:['#f48fb1','#ce93d8','#ffd54f','#f48fb1','#81d4fa','#b7e4c7','#ffab40','#ff6f00','#fff176'][i%9],
    rot:Math.random()*360,circle:Math.random()>0.5
  })));
  return(
    <div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:10000,overflow:'hidden'}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:'absolute',left:`${p.x}%`,top:0,width:p.size,height:p.size,
          background:p.color,borderRadius:p.circle?'50%':'2px',
          animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`,
          transform:`rotate(${p.rot}deg)`}}/>
      ))}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  // ── Persistent state ──────────────────────────────────────────
  const LS=(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?v:d;}catch{return d;}};
  const[xp,setXp]=useState(()=>parseInt(LS('ll_xp','0')));
  const[learned,setLearned]=useState(()=>{try{return new Set(JSON.parse(LS('ll_learned','[]')));}catch{return new Set();}});
  const[streak,setStreak]=useState(()=>parseInt(LS('ll_streak','0')));
  const[lastStudy,setLastStudy]=useState(()=>LS('ll_lastStudy',''));
  const[achievements,setAchievements]=useState(()=>{try{return new Set(JSON.parse(LS('ll_ach','[]')));}catch{return new Set();}});
  const[welcomed,setWelcomed]=useState(()=>LS('ll_welcomed','')!=='');
  const[notifEnabled,setNotifEnabled]=useState(()=>LS('ll_notif','')==='1'&&typeof Notification!=='undefined'&&Notification.permission==='granted');
  const[dailyDone,setDailyDone]=useState(()=>{try{const d=JSON.parse(LS('ll_daily','{}'));return d.date===todayStr()&&d.done;}catch{return false;}});

  useEffect(()=>{try{localStorage.setItem('ll_xp',xp);}catch{}},[xp]);
  useEffect(()=>{try{localStorage.setItem('ll_learned',JSON.stringify([...learned]));}catch{}},[learned]);
  useEffect(()=>{try{localStorage.setItem('ll_ach',JSON.stringify([...achievements]));}catch{}},[achievements]);

  // ── Meme Napoletani state ────────────────────────────────────
  const[memes,setMemes]=useState(()=>{try{const v=JSON.parse(LS('ll_memes','[]'));return Array.isArray(v)?v:[];}catch{return[];}});
  const[memeId,setMemeId]=useState(null);
  const[memeEdit,setMemeEdit]=useState(false);
  const[memeDraft,setMemeDraft]=useState('');
  const[memeSaved,setMemeSaved]=useState(true);
  const[memeSheet,setMemeSheet]=useState(null);
  const[memeAudioUrl,setMemeAudioUrl]=useState('');
  const memeFileRef=useRef(null);
  const memeSaveT=useRef(null);
  useEffect(()=>{try{localStorage.setItem('ll_memes',JSON.stringify(memes));}catch{}},[memes]);
  const curMeme=memes.find(m=>m.id===memeId)||null;
  useEffect(()=>{
    let url='';
    if(memeId&&curMeme&&curMeme.type==='mp3'){
      idbGet(memeId).then(blob=>{if(blob){url=URL.createObjectURL(blob);setMemeAudioUrl(url);}else setMemeAudioUrl('');}).catch(()=>setMemeAudioUrl(''));
    } else setMemeAudioUrl('');
    return()=>{if(url)URL.revokeObjectURL(url);};
  },[memeId]);
  function updateMeme(id,patch){setMemes(ms=>ms.map(m=>m.id===id?{...m,...patch}:m));}
  function saveMemeSheet(){
    const sh=memeSheet;if(!sh)return;
    const id='meme_'+Date.now();
    if(sh.type==='yt'){
      const ytId=parseYt(sh.url||'');
      if(!ytId){setMemeSheet({...sh,invalid:true});return;}
      setMemes(ms=>[{id,type:'yt',ytId,title:(sh.title||'').trim()||'Video YouTube 🎬',translation:'',date:itDate()},...ms]);
    }else{
      const f=memeFileRef.current;
      if(!f){setMemeSheet({...sh,invalid:true});return;}
      idbPut(id,f).catch(()=>{});
      setMemes(ms=>[{id,type:'mp3',title:(sh.title||'').trim()||f.name.replace(/\.[^.]+$/,''),translation:'',date:itDate()},...ms]);
    }
    memeFileRef.current=null;
    setMemeSheet(null);
  }
  function deleteMeme(){
    if(!curMeme)return;
    if(!window.confirm(`Vuoi eliminare "${curMeme.title}" dalla libreria?`))return;
    if(curMeme.type==='mp3')idbDel(curMeme.id).catch(()=>{});
    setMemes(ms=>ms.filter(m=>m.id!==curMeme.id));
    setMemeId(null);setMemeEdit(false);setScreen('memes');
  }
  function onMemeDraft(v){
    setMemeDraft(v);setMemeSaved(false);
    clearTimeout(memeSaveT.current);
    const id=memeId;
    memeSaveT.current=setTimeout(()=>{updateMeme(id,{translation:v});setMemeSaved(true);},600);
  }

  // ── UI state ─────────────────────────────────────────────────
  const[screen,setScreen]=useState('home');
  const[welcomeStep,setWelcomeStep]=useState(0);
  const[newAch,setNewAch]=useState(null);
  const[showFlash,setShowFlash]=useState(false);
  const[showReset,setShowReset]=useState(false);

  // ── Crystal ──────────────────────────────────────────────────
  const[crystalI,setCrystalI]=useState(()=>new Date().getDay()%CRYSTALS.length);
  const[wordI,setWordI]=useState(0);
  const[flipped,setFlipped]=useState(false);
  const[flipping,setFlipping]=useState(false);

  // ── Zodiac ───────────────────────────────────────────────────
  const[zodiacI,setZodiacI]=useState(()=>ZODIAC.findIndex(z=>z.isEmanuela));

  // ── Facts ────────────────────────────────────────────────────
  const[factI,setFactI]=useState(0);
  const[factWordI,setFactWordI]=useState(0);
  const[factFlipped,setFactFlipped]=useState(false);
  const[factFlipping,setFactFlipping]=useState(false);

  // ── TV ───────────────────────────────────────────────────────
  const[tvI,setTvI]=useState(0);
  const[tvPI,setTvPI]=useState(0);
  const[tvRev,setTvRev]=useState(false);
  const[provI,setProvI]=useState(0);
  const[provWordI,setProvWordI]=useState(0);
  const[provWordFlipped,setProvWordFlipped]=useState(false);
  const[provWordFlipping,setProvWordFlipping]=useState(false);

  // ── Quiz ─────────────────────────────────────────────────────
  const[quiz,setQuiz]=useState(null);
  const[qStep,setQStep]=useState(0);
  const[qAns,setQAns]=useState(null);
  const[qScore,setQScore]=useState(0);
  const[qDone,setQDone]=useState(false);
  const[qRev,setQRev]=useState(false);
  const[qDaily,setQDaily]=useState(false);
  const[tvQuizMode,setTvQuizMode]=useState(null);

  // ── Grammatica ───────────────────────────────────────────────
  const[gram,setGram]=useState(null);      // lista esercizi della lezione attiva
  const[gLesson,setGLesson]=useState(null); // metadati lezione
  const[gStep,setGStep]=useState(0);
  const[gAns,setGAns]=useState(null);       // {correct, given} dopo il controllo
  const[gScore,setGScore]=useState(0);
  const[gDone,setGDone]=useState(false);
  const[gInput,setGInput]=useState("");     // testo digitato (fill) o opzione scelta
  const[gPicked,setGPicked]=useState([]);   // token scelti per il riordino

  // Welcome-back notification
  useEffect(()=>{
    const last=parseInt(LS('ll_lastVisit','0'));
    const now=Date.now();
    try{localStorage.setItem('ll_lastVisit',now);}catch{}
    if(last>0&&typeof Notification!=='undefined'&&Notification.permission==='granted'&&(now-last)/3600000>20){
      const msg=NOTIF_MSGS[Math.floor(Math.random()*NOTIF_MSGS.length)];
      try{navigator.serviceWorker.ready.then(r=>r.showNotification('Luna & Letters 🌙',{body:msg,icon:'./icon-192.png',vibrate:[200,100,200]}));}
      catch{try{new Notification('Luna & Letters 🌙',{body:msg});}catch{}}
    }
  },[]);

  // ── Functions ────────────────────────────────────────────────
  function unlockAch(id){
    setAchievements(prev=>{
      if(prev.has(id)) return prev;
      const a=ACHIEVEMENTS.find(x=>x.id===id);
      if(!a) return prev;
      setTimeout(()=>{setNewAch(a);setTimeout(()=>setNewAch(null),3200);},200);
      return new Set([...prev,id]);
    });
  }

  function addXP(n){
    setXp(prev=>{
      const next=prev+n;
      if(prev<100&&next>=100) setTimeout(()=>unlockAch('full_moon'),300);
      if(prev<LEVELS[LEVELS.length-2].max&&next>=LEVELS[LEVELS.length-2].max) setTimeout(()=>unlockAch('master'),300);
      return next;
    });
  }

  function markStudied(){
    const today=todayStr(),yest=new Date(Date.now()-86400000).toDateString();
    if(lastStudy===today) return;
    const ns=lastStudy===yest?streak+1:1;
    setStreak(ns);setLastStudy(today);
    try{localStorage.setItem('ll_streak',ns);localStorage.setItem('ll_lastStudy',today);}catch{}
    if(ns===3) setTimeout(()=>unlockAch('streak_3'),300);
    if(ns===7) setTimeout(()=>unlockAch('streak_7'),300);
  }

  function learnWord(w){
    if(learned.has(w)) return;
    const ns=new Set([...learned,w]);
    setLearned(ns);addXP(5);markStudied();
    const c=ns.size;
    setTimeout(()=>{
      if(c===1) unlockAch('first_word');
      if(c===10) unlockAch('ten_words');
      if(c===50) unlockAch('fifty_words');
      if(c===100) unlockAch('hundred_words');
    },200);
    // false friend achievement
    const ffWords=['actually','eventually','library','sensible','sympathetic'];
    if(ffWords.includes(w)&&ffWords.every(fw=>ns.has(fw))) setTimeout(()=>unlockAch('false_friend'),300);
  }

  function speak(text){
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US';u.rate=0.82;window.speechSynthesis.speak(u);
  }

  function playSound(ok){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      if(ok){
        o.type='sine';o.frequency.value=523;
        g.gain.setValueAtTime(0.18,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
        o.start();o.stop(ctx.currentTime+0.5);
      }else{
        o.type='square';o.frequency.value=160;
        g.gain.setValueAtTime(0.1,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
        o.start();o.stop(ctx.currentTime+0.22);
      }
    }catch{}
  }

  // ── Chat ─────────────────────────────────────────────────────
  const[chatMessages,setChatMessages]=useState([]);
  const[chatInput,setChatInput]=useState('');
  const[chatLoading,setChatLoading]=useState(false);
  const[ttsEnabled,setTtsEnabled]=useState(false);
  const[listening,setListening]=useState(false);
  const chatBoxRef=useRef(null);
  useEffect(()=>{const el=chatBoxRef.current;if(el)el.scrollTop=el.scrollHeight;},[chatMessages,chatLoading]);

  async function handleSend(text){
    const msg=(text!==undefined?text:chatInput).trim();
    if(!msg||chatLoading) return;
    setChatInput('');
    const userMsg={role:'user',content:msg};
    const history=[...chatMessages,userMsg];
    setChatMessages(history);
    setChatLoading(true);
    try{
      const res=await fetch('/.netlify/functions/chat',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:history}),
      });
      const data=await res.json();
      const reply=data.text||data.error||'Ops, qualcosa non ha funzionato. Riprova! 🌙';
      setChatMessages(m=>[...m,{role:'assistant',content:reply}]);
      if(ttsEnabled){
        const clean=reply.replace(/[\u{1F1E6}-\u{1F1FF}]/gu,'').replace(/[✨🌙🌸🔮💎⭐💡]/gu,'').replace(/\n/g,' ');
        speak(clean);
      }
    }catch{
      setChatMessages(m=>[...m,{role:'assistant',content:'Ops, non riesco a rispondere ora. Controlla la connessione! 🌙'}]);
    }finally{setChatLoading(false);}
  }

  function startListening(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Il microfono non è supportato su questo browser.\nProva a usare Chrome!');return;}
    const r=new SR();
    r.lang='it-IT';r.interimResults=false;
    setListening(true);
    r.onresult=e=>{setChatInput(e.results[0][0].transcript);setListening(false);};
    r.onerror=()=>setListening(false);
    r.onend=()=>setListening(false);
    r.start();
  }

  function doFlip(setFlip,setFlipAnim,cb){
    if(setFlip===setFlipped&&flipped) return;
    if(setFlip===setFactFlipped&&factFlipped) return;
    setFlipAnim(true);
    setTimeout(()=>{cb();setFlipAnim(false);},160);
  }

  function startQuiz(count,rev,daily){
    const all=[];
    CRYSTALS.forEach(c=>c.words.forEach(w=>all.push(w)));
    FACTS.forEach(f=>f.words.forEach(w=>all.push(w)));
    const sel=shuffle(all).slice(0,count);
    const qs=sel.map(q=>{
      const wrong=shuffle(all.filter(w=>rev?w.en!==q.en:w.it!==q.it)).slice(0,3);
      return{...q,options:shuffle([q,...wrong])};
    });
    setQuiz(qs);setQStep(0);setQScore(0);setQAns(null);setQDone(false);setQRev(rev);setQDaily(daily);
    setTvQuizMode(null);
    setScreen('quiz');
  }

  function startTVQuiz(mode){
    const all=[];
    TV.forEach(s=>s.phrases.forEach(p=>all.push({...p,show:s.show,showEmoji:s.emoji})));
    const sel=shuffle(all).slice(0,10);
    const qs=sel.map(q=>{
      if(mode==='show'){
        const wrongShows=shuffle(TV.map(s=>({show:s.show,showEmoji:s.emoji})).filter(s=>s.show!==q.show)).slice(0,3);
        return{...q,options:shuffle([{show:q.show,showEmoji:q.showEmoji},...wrongShows])};
      } else {
        const wrong=shuffle(all.filter(p=>p.it!==q.it)).slice(0,3);
        return{...q,options:shuffle([q,...wrong])};
      }
    });
    setQuiz(qs);setQStep(0);setQScore(0);setQAns(null);setQDone(false);setQRev(false);setQDaily(false);
    setTvQuizMode(mode);
    setScreen('quiz');
  }

  function handleAns(opt){
    if(qAns) return;
    setQAns(opt);
    let correct;
    if(tvQuizMode==='show') correct=opt.show===quiz[qStep].show;
    else if(tvQuizMode==='translate') correct=opt.it===quiz[qStep].it;
    else correct=qRev?opt.en===quiz[qStep].en:opt.it===quiz[qStep].it;
    if(correct){setQScore(s=>s+1);addXP(qDaily||qRev?20:10);markStudied();}
    playSound(correct);
    setTimeout(()=>{
      if(qStep+1>=quiz.length){
        setQDone(true);
        const finalScore=qScore+(correct?1:0);
        if(!qRev&&finalScore===quiz.length&&quiz.length===10){setTimeout(()=>unlockAch('perfect_quiz'),300);setShowFlash(true);setTimeout(()=>setShowFlash(false),900);}
        if(qDaily){
          setDailyDone(true);
          try{localStorage.setItem('ll_daily',JSON.stringify({date:todayStr(),done:true}));}catch{}
          setTimeout(()=>unlockAch('daily_done'),300);
        }
      } else{setQStep(s=>s+1);setQAns(null);}
    },1300);
  }

  // ── Grammatica ───────────────────────────────────────────────
  function normAns(s){return String(s||"").toLowerCase().trim().replace(/\s+/g," ").replace(/[.!?,]+$/,"");}

  function startGrammar(lesson){
    const items=[];
    lesson.exercises.forEach(ex=>{
      if(ex.type==="reading"){

  function submitGrammar(value){
    if(gAns) return;
    const ex=gram[gStep];
    let correct;
    if(ex.type==="fill"){
      const ok=[ex.answer,...(ex.alts||[])].map(normAns);
      correct=ok.includes(normAns(value));
    } else if(ex.type==="reorder"){
      correct=normAns(value)===normAns(ex.answer);
    } else { // choice / reading
      correct=value===ex.answer;
    }
    setGAns({correct,given:value});
    if(correct){setGScore(s=>s+1);addXP(10);markStudied();}
    playSound(correct);
  }

              let bg="rgba(255,255,255,0.06)",bd="rgba(255,255,255,0.14)";
              if(gAns){if(isCorrect){bg="rgba(76,175,80,0.3)";bd="#4caf50";}else if(isSel){bg="rgba(244,67,54,0.3)";bd="#f44336";}}
              return(<button key={i} onClick={()=>submitGrammar(opt)} disabled={!!gAns}
                style={{background:bg,border:`2px solid ${bd}`,borderRadius:16,padding:"15px 16px",color:"#fff",fontSize:15,fontWeight:600,cursor:gAns?"default":"pointer",textAlign:"left",transition:"all 0.2s",lineHeight:1.4}}>
                {opt}{gAns&&isCorrect&&" ✅"}{gAns&&isSel&&!isCorrect&&" ❌"}
              </button>);
            })}
          </div>
        )}

        {/* RIORDINO · reorder */}
        {ex.type==="reorder"&&(
          <div>
            <div style={{minHeight:54,border:`2px solid ${gAns?(gAns.correct?"#4caf50":"#f44336"):"rgba(244,143,177,0.4)"}`,borderRadius:16,padding:"10px 12px",marginBottom:12,display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",background:"rgba(255,255,255,0.04)"}}>
              {gPicked.length===0&&<span style={{...S.muted,fontSize:13}}>Tocca le parole nell'ordine giusto 👇</span>}
              {gPicked.map((tok,i)=>(
                <button key={i} onClick={()=>{if(!gAns)setGPicked(p=>p.filter((_,j)=>j!==i));}} disabled={!!gAns}
                  style={{background:"rgba(244,143,177,0.2)",border:"1px solid rgba(244,143,177,0.5)",borderRadius:12,padding:"7px 13px",color:"#fff",fontSize:15,cursor:gAns?"default":"pointer"}}>{tok}</button>
              ))}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
              {ex.scrambled.map((tok,i)=>{
                // un token sorgente è "usato" se la sua occorrenza è già tra quelle scelte
                const usedCount=gPicked.filter(t=>t===tok).length;
                const sameBefore=ex.scrambled.slice(0,i).filter(t=>t===tok).length;
                const isUsed=sameBefore<usedCount;
                return(<button key={i} onClick={()=>{if(!gAns&&!isUsed)setGPicked(p=>[...p,tok]);}} disabled={!!gAns||isUsed}
                  style={{background:isUsed?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:12,padding:"9px 14px",color:isUsed?"rgba(255,255,255,0.25)":"#fff",fontSize:15,cursor:gAns||isUsed?"default":"pointer"}}>{tok}</button>);
              })}
            </div>
            {!gAns&&<div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={()=>setGPicked([])} disabled={gPicked.length===0} style={{...S.soft(),flex:1,opacity:gPicked.length?1:0.4}}>↺ Cancella</button>
              <button onClick={()=>submitGrammar(gPicked.join(" "))} disabled={gPicked.length===0} style={{...S.btn(),flex:1.4,opacity:gPicked.length?1:0.4}}>Controlla</button>
            </div>}
          </div>
        )}

        {/* FEEDBACK + spiegazione */}
        {gAns&&(
          <div style={{marginTop:16,border:`1px solid ${gAns.correct?"rgba(76,175,80,0.5)":"rgba(244,67,54,0.5)"}`,background:gAns.correct?"rgba(76,175,80,0.12)":"rgba(244,67,54,0.1)",borderRadius:18,padding:"15px 17px",animation:"fadeIn 0.3s ease"}}>
            <div style={{fontWeight:800,fontSize:15,color:gAns.correct?"#b7e4c7":"#ef9a9a",marginBottom:6}}>{gAns.correct?"✅ Giusto! +10 XP":"❌ Quasi!"}</div>
            {!gAns.correct&&(ex.type==="fill"||ex.type==="reorder")&&(
              <div style={{fontSize:14,color:"#fff",marginBottom:6}}>Risposta corretta: <b style={{color:"#ffd54f"}}>{ex.answer}</b></div>
            )}
            {ex.it&&<div style={{fontSize:13.5,color:"#f3e1ee",fontStyle:"italic",lineHeight:1.6,marginBottom:ex.note?6:0}}>🇮🇹 {ex.it}</div>}
            {ex.note&&<div style={{fontSize:12.5,color:"#c8a0c0",lineHeight:1.65}}>💡 {ex.note}</div>}
            <button onClick={nextGrammar} style={{...S.btn(),width:"100%",marginTop:13}}>{gStep+1>=gram.length?"🏁 Vedi il risultato":"Continua →"}</button>
          </div>
        )}
        <div style={{height:24}}/>
      </div></div>{overlays}</>
    );
  }

  // ── PROVERBI ─────────────────────────────────────────────────
  if(screen==="proverbi"){
    const p=PROVERBS[provI],w=p.words[provWordI];
    return(
      <div style={S.app}><div style={S.wrap}>
        <button style={S.back} onClick={()=>{setScreen("home");setProvI(0);setProvWordI(0);setProvWordFlipped(false);}}>← Home</button>
        <div style={S.center}>
          <div style={{fontSize:44,marginBottom:4}}>🤌</div>
          <div style={S.gtxt}>Detti Napoletani</div>
          <div style={{...S.muted,marginTop:2}}>Proverbio {provI+1} di {PROVERBS.length}</div>
        </div>

        <div style={S.card({background:"linear-gradient(135deg,#bf360c88,#e6510066)",borderColor:"#ff6f0055",margin:"14px 0"})}>
          <div style={{...S.muted,fontSize:11,marginBottom:8}}>🇬🇧 In inglese</div>
          <div style={{fontSize:17,fontWeight:800,lineHeight:1.6,marginBottom:10,color:"#fff"}}>"{p.en}"</div>
          <button onClick={()=>speak(p.en)} style={S.spk}>🔊 Ascolta</button>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.15)",marginTop:14,paddingTop:12}}>
            <div style={{...S.muted,fontSize:11,marginBottom:4}}>🗺️ In napoletano</div>
            <div style={{fontSize:14,color:"#ffd54f",fontStyle:"italic",lineHeight:1.7}}>"{p.nap}"</div>
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.15)",marginTop:12,paddingTop:12}}>
            <div style={{...S.muted,fontSize:11,marginBottom:4}}>🇮🇹 In italiano</div>
            <div style={{fontSize:14,color:"#c8a0c0",lineHeight:1.7}}>"{p.it}"</div>
          </div>
        </div>

        <div style={S.card({background:"rgba(255,255,255,0.04)",marginBottom:12})}>
          <div style={{...S.muted,fontSize:11,marginBottom:6}}>💡 Cosa significa</div>
          <div style={{fontSize:13,color:"#f3e1ee",lineHeight:1.8}}>{p.meaning}</div>
          <div style={{fontSize:12,color:"#a98cc8",marginTop:8,fontStyle:"italic",lineHeight:1.6}}>🇬🇧 {p.meaningEn}</div>
        </div>

        <div style={{...S.center,...S.muted,marginBottom:8,fontSize:12}}>📚 Parole dal proverbio · {provWordI+1}/{p.words.length}</div>
        <div
          onClick={()=>{if(!provWordFlipped&&!provWordFlipping){setProvWordFlipping(true);setTimeout(()=>{setProvWordFlipped(true);learnWord(w.en);setProvWordFlipping(false);},160);}}}
          style={S.card({background:provWordFlipped?"linear-gradient(135deg,#1b5e2088,#4caf5044)":"linear-gradient(135deg,#bf360c44,#e6510033)",...S.center,padding:24,minHeight:120,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:provWordFlipped?"default":"pointer",transform:provWordFlipping?"scaleX(0.05)":"scaleX(1)",transition:"transform 0.16s ease"})}>
          <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>{w.en}</div>
          {!provWordFlipped
            ?(<><button onClick={e=>{e.stopPropagation();speak(w.en);}} style={S.spk}>🔊 Ascolta</button><div style={{color:"#f5c8d8",fontSize:13,marginTop:4}}>Tocca per scoprire! 👆</div></>)
            :(<><button onClick={e=>{e.stopPropagation();speak(w.en);}} style={S.spk}>🔊 Ascolta ancora</button><div style={{fontSize:18,fontWeight:800,color:"#b7e4c7",margin:"4px 0"}}>{w.it}</div><div style={{fontSize:12,color:"#c8a0c0",fontStyle:"italic",marginTop:4}}>"{w.ex}"</div><div style={{marginTop:8,fontSize:16}}>✅ +5 XP!</div></>)}
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
          {provWordI>0&&<button style={S.soft()} onClick={()=>{setProvWordI(i=>i-1);setProvWordFlipped(false);}}>← Prec</button>}
          {provWordI<p.words.length-1
            ?<button style={S.btn()} onClick={()=>{setProvWordI(i=>i+1);setProvWordFlipped(false);}}>Parola successiva →</button>
            :<div style={{...S.muted,fontSize:12,...S.center}}>✅ Hai imparato tutte le parole!</div>}
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          {provI>0&&<button style={S.soft()} onClick={()=>{setProvI(i=>i-1);setProvWordI(0);setProvWordFlipped(false);}}>← Proverbio prec.</button>}
          {provI<PROVERBS.length-1
            ?<button style={S.btn("linear-gradient(135deg,#e65100,#ff6f00)")} onClick={()=>{setProvI(i=>i+1);setProvWordI(0);setProvWordFlipped(false);}}>Prossimo proverbio →</button>
            :<button style={S.btn("linear-gradient(135deg,#2e7d32,#66bb6a)")} onClick={()=>{setScreen("home");setProvI(0);setProvWordI(0);setProvWordFlipped(false);}}>🌟 Completato!</button>}
        </div>
      </div>{overlays}</div>
    );
  }

  // ── CHAT ──────────────────────────────────────────────────────
  if(screen==="chat") return(
    <div style={{...S.app,display:"flex",flexDirection:"column",height:"100vh",maxHeight:"100vh"}}>
      <div style={{background:"linear-gradient(135deg,#2b0e40,#23093a)",padding:"14px 16px",borderBottom:"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button style={{...S.back,marginBottom:0}} onClick={()=>setScreen("home")}>← Home</button>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:10}}>
          <img src="Luna_AI_assistant.png" style={{width:40,height:40,borderRadius:"50%",objectFit:"cover",flexShrink:0,border:"2px solid rgba(244,143,177,0.6)"}} alt="Luna"/>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>Luna, la tua tutor</div>
            <div style={{...S.muted,fontSize:11}}>AI · scrivi in italiano o in inglese!</div>
          </div>
        </div>
        <button onClick={()=>setTtsEnabled(t=>!t)} style={{background:ttsEnabled?"rgba(0,150,136,0.3)":"rgba(255,255,255,0.08)",border:`1px solid ${ttsEnabled?"#00bcd4":"rgba(255,255,255,0.15)"}`,borderRadius:20,padding:"6px 12px",color:"#fff",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
          {ttsEnabled?"🔊 Voce ON":"🔇 Voce OFF"}
        </button>
      </div>

      <div ref={chatBoxRef} style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
        {chatMessages.length===0&&(
          <div style={{animation:"fadeIn 0.4s ease"}}>
            <div style={{background:"rgba(0,105,92,0.25)",border:"1px solid rgba(0,188,212,0.3)",borderRadius:"4px 20px 20px 20px",padding:"14px 16px",maxWidth:"88%",marginBottom:16}}>
              <div style={{fontSize:13,lineHeight:1.9,color:"#e0f2f1"}}>
                🌙 Ciao Emanuela! Sono <strong>Luna</strong>, la tua tutor di inglese!<br/><br/>
                Scrivimi <strong>in italiano</strong> e ti aiuto a dirlo in inglese, oppure prova <strong>direttamente in inglese</strong> — correggo io con gentilezza. Puoi anche usare il 🎤 microfono!
              </div>
            </div>
            <div style={{...S.muted,fontSize:12,marginBottom:10}}>💡 Da dove vuoi iniziare?</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {[
                "Come si dice 'luna piena' in inglese?",
                "Parliamo di cristalli 💎",
                "Aiutami col mio segno ♐",
                "Voglio fare conversazione!",
                "Spiegami una parola che non capisco",
                "Parliamo di Bridgerton 🌹",
              ].map((s,i)=>(
                <button key={i} onClick={()=>handleSend(s)}
                  style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"8px 14px",color:"#c8a0c0",fontSize:12,cursor:"pointer"}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        )}

        {chatMessages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",alignItems:"flex-end",gap:8}}>
            {m.role==="assistant"&&<img src="Luna_AI_assistant.png" style={{width:28,height:28,borderRadius:"50%",objectFit:"cover",flexShrink:0}} alt="Luna"/>}
            <div style={{
              background:m.role==="user"?"linear-gradient(135deg,#f48fb1,#ce93d8)":"rgba(255,255,255,0.07)",
              border:m.role==="user"?"none":"1px solid rgba(255,255,255,0.12)",
              borderRadius:m.role==="user"?"20px 4px 20px 20px":"4px 20px 20px 20px",
              padding:"12px 16px",maxWidth:"88%",
              fontSize:13,lineHeight:1.85,color:"#fff",whiteSpace:"pre-wrap",wordBreak:"break-word",
            }}>{m.content}</div>
          </div>
        ))}

        {chatLoading&&(
          <div style={{display:"flex",justifyContent:"flex-start"}}>
            <div style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"4px 20px 20px 20px",padding:"12px 16px",color:"#c8a0c0",fontSize:13}}>
              Luna sta scrivendo ✨
            </div>
          </div>
        )}
      </div>

      <div style={{background:"rgba(27,7,38,0.97)",borderTop:"1px solid rgba(255,255,255,0.1)",padding:"12px 16px",display:"flex",gap:10,alignItems:"flex-end",flexShrink:0}}>
        <textarea
          value={chatInput}
          onChange={e=>setChatInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend();}}}
          placeholder="Scrivi in italiano o in inglese..."
          rows={1}
          style={{flex:1,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:16,padding:"10px 14px",color:"#fff",fontSize:14,resize:"none",outline:"none",fontFamily:"system-ui,sans-serif",lineHeight:1.5,maxHeight:100,overflowY:"auto"}}
        />
        <button onClick={startListening}
          style={{background:listening?"rgba(244,67,54,0.3)":"rgba(255,255,255,0.08)",border:`1px solid ${listening?"#f44336":"rgba(255,255,255,0.15)"}`,borderRadius:14,padding:"10px 12px",color:listening?"#ef9a9a":"#c8a0c0",fontSize:18,cursor:"pointer",flexShrink:0}}>
          🎤
        </button>
        <button onClick={()=>handleSend()} disabled={!chatInput.trim()||chatLoading}
          style={{background:"linear-gradient(135deg,#00695c,#00bcd4)",border:"none",borderRadius:14,padding:"10px 18px",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",flexShrink:0,opacity:chatInput.trim()&&!chatLoading?1:0.4}}>
          ➤
        </button>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
